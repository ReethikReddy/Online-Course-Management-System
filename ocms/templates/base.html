<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCMS - {% block title %}Online Course Management System{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
                <span style="font-size: 1.5rem;">🎓</span> OCMS
            </a>
            <div class="nav-links" id="nav-links">
                <a href="/">Home</a>
                <a href="/courses">Courses</a>
                <!-- Links injected via JS based on auth state -->
            </div>
        </div>
    </nav>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <footer>
        <p>&copy; 2026 Online Course Management System. All rights reserved.</p>
    </footer>
    <script src="{% static 'js/main.js' %}"></script>
    {% block scripts %}
    {% endblock %}
</body>

</html>
