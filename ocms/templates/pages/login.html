{% extends 'base.html' %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Log In to OCMS</h2>
    <div id="error-message" style="color: var(--danger); text-align: center; margin-bottom: 1rem; display: none;"></div>

    <form id="login-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit">Log In</button>
    </form>

    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
        Don't have an account? <a href="/register" style="color: var(--primary); text-decoration: none;">Sign up</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('error-message');
        const submitBtn = document.querySelector('.btn-submit');

        errorEl.style.display = 'none';
        submitBtn.textContent = 'Logging in...';
        submitBtn.disabled = true;

        const data = {
            username: e.target.username.value,
            password: e.target.password.value
        };

        try {
            const response = await fetch('/api/auth/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                const result = await response.json();
                // Store tokens
                localStorage.setItem('access_token', result.access);
                localStorage.setItem('refresh_token', result.refresh);

                // fetch user profile to get role
                const profileResponse = await fetch('/api/auth/profile/', {
                    headers: { 'Authorization': `Bearer ${result.access}` }
                });
                if (profileResponse.ok) {
                    const profile = await profileResponse.json();
                    localStorage.setItem('user_role', profile.role);
                    window.location.href = '/dashboard';
                } else {
                    window.location.href = '/';
                }
            } else {
                errorEl.textContent = 'Invalid username or password';
                errorEl.style.display = 'block';
            }
        } catch (err) {
            errorEl.textContent = 'An error occurred. Please try again.';
            errorEl.style.display = 'block';
        } finally {
            submitBtn.textContent = 'Log In';
            submitBtn.disabled = false;
        }
    });
</script>
{% endblock %}
